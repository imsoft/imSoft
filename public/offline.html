<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imSoft | Modo Offline</title>
  <link rel="icon" type="image/png" href="/manifest/ios/32.png">
  <style>
    :root {
      --bg: #030712;
      --card-bg: #0f172a;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #1e9df1;
      --primary-hover: #0ea5e9;
      --border: #1e293b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    }

    .logo {
      height: 48px;
      width: auto;
      margin-bottom: 30px;
    }

    .icon-wrapper {
      background: rgba(30, 157, 241, 0.1);
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--primary);
    }

    .icon {
      width: 32px;
      height: 32px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--primary);
      color: #ffffff;
      font-weight: 600;
      font-size: 15px;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.1s ease;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: pulse-animation 1.5s infinite;
    }

    @keyframes pulse-animation {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logos/logo-imsoft-blue.png" alt="imSoft" class="logo">
    
    <div class="status-badge">
      <span class="pulse"></span>
      Sin Conexión
    </div>

    <div class="icon-wrapper">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 002 2h2.945M11.025 22c5.474 0 9.925-4.47 9.925-9.925 0-5.475-4.45-9.925-9.925-9.925M11.025 22a9.925 9.925 0 01-9.925-9.925c0-5.475 4.45-9.925 9.925-9.925" />
      </svg>
    </div>

    <h1>Parece que estás offline</h1>
    <p>Revisa tu conexión a Internet. Una vez que vuelvas a estar conectado, podrás seguir navegando en imSoft sin problemas.</p>
    
    <button class="btn" onclick="window.location.reload()">Reintentar Conexión</button>
  </div>
</body>
</html>
